<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G</title>
<script type="importmap">
{
  "imports": {
    "firebase/app": "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js",
    "firebase/storage": "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js"
  }
}
</script>
<style>
:root{--aqua:#00FFD1;--black:#000;--dark:#111;--gray:#222}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{background:var(--black);color:#fff;min-height:100vh;overflow-x:hidden}
.screen{display:none;min-height:100vh}.screen.active{display:flex;flex-direction:column}
#login{justify-content:center;align-items:center;padding:20px;text-align:center;position:relative}
.login-glow{position:absolute;inset:0;background:radial-gradient(circle at 50% 30%,rgba(0,255,209,.18),transparent 60%);animation:pulse 3s infinite}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
.logo{width:90px;height:90px;border-radius:24px;background:var(--aqua);display:flex;align-items:center;justify-content:center;font-weight:900;color:#000;font-size:48px;margin-bottom:20px;box-shadow:0 0 40px rgba(0,255,209,.5);animation:float 3s ease-in-out infinite;z-index:2}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
h1{font-size:32px;margin-bottom:8px;font-weight:800;z-index:2}p{opacity:.7;margin-bottom:8px;z-index:2}
.subtitle{opacity:.5;font-size:15px;margin-bottom:40px;z-index:2}
.btn-google{display:flex;align-items:center;justify-content:center;gap:12px;background:#fff;color:#000;border:none;padding:16px 32px;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;width:100%;max-width:320px;transition:.2s;z-index:2}
.btn-google:active{transform:scale(.98)}
.btn-google img{width:20px;height:20px}
.guest-btn{background:none;border:none;color:#555;font-size:14px;margin-top:20px;cursor:pointer;z-index:2}
.footer-text{position:absolute;bottom:30px;font-size:12px;opacity:.3;z-index:2}
#app{padding-bottom:70px}
header{padding:15px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--gray);position:sticky;top:0;background:rgba(0,0,0,.9);backdrop-filter:blur(10px);z-index:10}
header h2{color:var(--aqua);font-weight:800;font-size:24px}
nav{position:fixed;bottom:0;left:0;right:0;background:var(--black);border-top:1px solid var(--gray);display:flex;justify-content:space-around;padding:12px 0}
.nav-btn{background:none;border:none;color:#666;font-size:26px;padding:8px;cursor:pointer}.nav-btn.active{color:var(--aqua)}
.post{background:var(--dark);margin:12px;border-radius:18px;overflow:hidden;border:1px solid var(--gray)}
.post-header{display:flex;align-items:center;gap:10px;padding:12px}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--aqua);display:flex;align-items:center;justify-content:center;color:#000;font-weight:700}
.post img{width:100%;display:block;max-height:500px;object-fit:cover}
.post-actions{display:flex;gap:16px;padding:12px}
.action{background:none;border:none;color:#fff;font-size:22px;cursor:pointer}
.post-caption{padding:0 12px 12px;font-size:14px}
.post-caption b{color:var(--aqua)}
.fab{position:fixed;bottom:80px;right:20px;width:56px;height:56px;background:var(--aqua);color:#000;border-radius:50%;border:none;font-size:28px;cursor:pointer;box-shadow:0 4px 20px rgba(0,255,209,.4);font-weight:700;z-index:20}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.95);display:none;align-items:center;justify-content:center;padding:20px;z-index:100}
.modal.active{display:flex}.modal-content{background:var(--dark);padding:24px;border-radius:20px;width:100%;max-width:400px;border:1px solid #333}
input,textarea{width:100%;background:var(--black);border:1px solid #333;color:#fff;padding:14px;border-radius:10px;margin:8px 0;font-size:16px}
input:focus,textarea:focus{outline:none;border-color:var(--aqua)}
.btn{background:var(--aqua);color:#000;border:none;padding:14px;border-radius:12px;font-weight:700;cursor:pointer;width:100%;margin-top:8px}
.btn-secondary{background:#222;color:#fff}
#preview{width:100%;max-height:200px;object-fit:cover;border-radius:10px;margin:8px 0;display:none}
</style>
</head>
<body>
<div id="login" class="screen active">
  <div class="login-glow"></div>
  <div class="logo">G</div>
  <h1>Bem-vindo ao G</h1>
  <p class="subtitle">Sua rede. Suas regras. Sem algoritmo chato.</p>
  <button class="btn-google" id="loginBtn">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
    Continuar com Google
  </button>
  <button class="guest-btn" id="guestBtn">continuar sem conta</button>
  <p class="footer-text">Ao entrar, você concorda em postar coisas insanas</p>
</div>

<div id="onboard" class="screen">
  <div style="padding:40px 20px;max-width:400px;margin:0 auto;width:100%">
    <h1>Quase lá</h1>
    <p>Escolha seu nome no G</p>
    <input id="nameInput" placeholder="Seu nome" maxlength="20">
    <textarea id="bioInput" placeholder="Sua bio" maxlength="80" rows="3"></textarea>
    <button class="btn" id="saveProfile">Continuar</button>
  </div>
</div>

<div id="app" class="screen">
  <header>
    <h2>G</h2>
    <button id="logout" style="background:none;border:none;color:#666;font-size:14px">Sair</button>
  </header>
  <div id="feed"></div>
  <nav>
    <button class="nav-btn active">⌂</button>
    <button class="nav-btn">⌕</button>
    <button class="nav-btn" style="opacity:0">+</button>
    <button class="nav-btn">♡</button>
    <button class="nav-btn">◯</button>
  </nav>
  <button class="fab" id="fab">+</button>
</div>

<div id="postModal" class="modal">
  <div class="modal-content">
    <h3 style="margin-bottom:12px">Novo post</h3>
    <input type="file" id="fileInput" accept="image/*">
    <img id="preview">
    <textarea id="captionInput" placeholder="Legenda..." rows="3"></textarea>
    <button class="btn" id="publishBtn">Publicar</button>
    <button class="btn btn-secondary" onclick="document.getElementById('postModal').classList.remove('active')">Cancelar</button>
  </div>
</div>

<script type="module">
import { initializeApp } from 'firebase/app';
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from 'firebase/auth';
import { getFirestore, doc, setDoc, getDoc, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from 'firebase/firestore';
import { getStorage, ref, uploadBytes, getDownloadURL } from 'firebase/storage';

const firebaseConfig = {
  apiKey: "AIzaSyCiD5JqIoSzbSGqwLKPF4eqU9BAmtoTRFo",
  authDomain: "studio-app-g.firebaseapp.com",
  projectId: "studio-app-g",
  storageBucket: "studio-app-g.firebasestorage.app",
  messagingSenderId: "122151069115",
  appId: "1:122151069115:web:6678a32b3001218586109e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);
const provider = new GoogleAuthProvider();

document.getElementById('loginBtn').onclick = async () => {
  try {
    await signInWithPopup(auth, provider);
  } catch(e) {
    alert('Erro no login: ' + e.message);
  }
};

document.getElementById('logout').onclick = () => signOut(auth);
document.getElementById('guestBtn').onclick = () => { show('app'); loadDemoFeed(); };

onAuthStateChanged(auth, async (user) => {
  if (!user) { return; }
  const userDoc = await getDoc(doc(db, 'users', user.uid));
  if (!userDoc.exists()) { show('onboard'); }
  else { show('app'); loadFeed(); }
});

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

document.getElementById('saveProfile').onclick = async () => {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) return alert('Coloque um nome');
  const user = auth.currentUser;
  await setDoc(doc(db, 'users', user.uid), {
    name, bio: document.getElementById('bioInput').value.trim(),
    photo: user.photoURL, createdAt: serverTimestamp()
  });
  show('app'); loadFeed();
};

document.getElementById('fab').onclick = () => document.getElementById('postModal').classList.add('active');
document.getElementById('fileInput').onchange = e=>{
  const f = e.target.files[0];
  if(f){ const r = new FileReader(); r.onload = ev=>{document.getElementById('preview').src=ev.target.result;document.getElementById('preview').style.display='block'}; r.readAsDataURL(f); }
};

document.getElementById('publishBtn').onclick = async () => {
  const file = document.getElementById('fileInput').files[0];
  const caption = document.getElementById('captionInput').value;
  if (!file) return alert('Escolha uma foto');
  if (!auth.currentUser) return alert('Faça login para postar');
  const user = auth.currentUser;
  const userDoc = await getDoc(doc(db, 'users', user.uid));
  const storageRef = ref(storage, `posts/${Date.now()}_${file.name}`);
  await uploadBytes(storageRef, file);
  const url = await getDownloadURL(storageRef);
  await addDoc(collection(db, 'posts'), {
    userId: user.uid, userName: userDoc.data().name, userPhoto: user.photoURL,
    imageUrl: url, caption, createdAt: serverTimestamp(), likes: 0
  });
  document.getElementById('postModal').classList.remove('active');
  document.getElementById('fileInput').value = ''; document.getElementById('captionInput').value = ''; document.getElementById('preview').style.display='none';
};

function loadFeed() {
  const q = query(collection(db, 'posts'), orderBy('createdAt', 'desc'));
  onSnapshot(q, (snap) => {
    const feed = document.getElementById('feed'); feed.innerHTML = '';
    snap.forEach(doc => {
      const p = doc.data();
      feed.innerHTML += `<div class="post"><div class="post-header"><div class="avatar">${p.userName[0].toUpperCase()}</div><b>${p.userName}</b></div></div><img src="${p.imageUrl}" loading="lazy"><div class="post-actions"><button class="action">♥</button><button class="action">💬</button><button class="action">↗</button></div><div class="post-caption"><b>${p.userName}</b> ${p.caption||''}</div></div>`;
    });
    if (snap.empty) feed.innerHTML = '<p style="text-align:center;padding:60px;opacity:.5">Nenhum post ainda<br>Seja o primeiro!</p>';
  });
}

function loadDemoFeed() {
  const feed = document.getElementById('feed');
  feed.innerHTML = `<div class="post"><div class="post-header"><div class="avatar">A</div><div><b>ana</b></div></div><img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=800"><div class="post-actions"><button class="action">♥</button></div><div class="post-caption"><b>ana</b> primeiro teste do G 🔥</div></div>
  <div class="post"><div class="post-header"><div class="avatar">L</div><div><b>luiz</b></div></div><img src="https://images.unsplash.com/photo-1518837695005-2083093ee35b?w=800"><div class="post-caption"><b>luiz</b> verde água vicia mesmo</div></div>`;
}
</script>
</body>
</html>
